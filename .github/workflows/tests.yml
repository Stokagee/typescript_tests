name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moje_app
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U postgres -d moje_app"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      backend:
        image: ghcr.io/stokagee/moje-app-backend:latest
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/moje_app
          LOG_LEVEL: INFO
          SECRET_TOKENS: dum,pes
          APP_NAME: moje-app
          ENVIRONMENT: ci
          BRANCH_NAME: ci
          SECRET_KEY: ci-secret-key-not-for-production
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          CSRF_SECRET_KEY: ci-csrf-secret
          FORCE_HTTPS: "false"
          TRUSTED_PROXIES: ""
        ports:
          - "20300:8000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Wait for backend to be healthy
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:20300/ > /dev/null; then
              echo "Backend ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Backend never became ready — dumping logs:"
          docker ps -a
          docker logs "$(docker ps -aq --filter 'ancestor=ghcr.io/stokagee/moje-app-backend:latest')" || true
          exit 1

      - name: Prepare .env for CI
        run: cp .env.example .env

      - name: Run Playwright tests
        run: pnpm test
        env:
          CI: "true"

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload trace artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results
          path: test-results/junit.xml
          retention-days: 7
