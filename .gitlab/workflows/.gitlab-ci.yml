stages:
  - quality
  - test

variables:
  PNPM_HOME: "${CI_PROJECT_DIR}/.pnpm-store"

cache:
  paths:
    - .pnpm-store
    - node_modules/

before_script:
  - corepack enable
  - corepack prepare pnpm@10 --activate
  - pnpm config set store-dir .pnpm-store
  - pnpm install --frozen-lockfile

quality:
  stage: quality
  image: node:24-bookworm
  script:
    - pnpm type-check
    - pnpm lint
    - pnpm format:check

api-tests:
  stage: test
  image: node:24-bookworm
  services:
    - name: postgres:17
      alias: postgres
    # Tvůj backend image, pokud existuje
  variables:
    POSTGRES_PASSWORD: test
    POSTGRES_DB: kuryri_test
    BASE_URL: http://localhost:20300
  script:
    - cp .env.example .env
    - pnpm test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 1 week